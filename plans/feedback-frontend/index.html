<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Submit your feedback to help us improve our service">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Share Your Feedback</h1>
            <p class="subtitle">We value your input and use it to improve our service</p>
        </header>

        <!-- Success Message Container -->
        <div id="success-message" class="message success-message" role="alert" aria-live="polite" hidden>
            <svg class="message-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <span class="message-text">Thank you! Your feedback has been submitted successfully.</span>
        </div>

        <!-- Error Message Container -->
        <div id="error-message" class="message error-message" role="alert" aria-live="assertive" hidden>
            <svg class="message-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
            <span class="message-text" id="error-text">An error occurred. Please try again.</span>
        </div>

        <!-- Feedback Form -->
        <form id="feedback-form" class="feedback-form" novalidate>
            <!-- Feedback Type Field -->
            <div class="form-group">
                <label for="feedback-type" class="form-label">
                    Feedback Type
                    <span class="required" aria-label="required">*</span>
                </label>
                <select 
                    id="feedback-type" 
                    name="feedbackType" 
                    class="form-select" 
                    required
                    aria-describedby="feedback-type-error"
                >
                    <option value="" disabled selected>Select a feedback type</option>
                    <option value="bug_report">Bug Report</option>
                    <option value="feature_request">Feature Request</option>
                    <option value="general_feedback">General Feedback</option>
                    <option value="other">Other</option>
                </select>
                <span id="feedback-type-error" class="field-error" role="alert" aria-live="polite"></span>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label for="email" class="form-label">
                    Email Address
                    <span class="required" aria-label="required">*</span>
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    placeholder="your.email@example.com"
                    required
                    autocomplete="email"
                    aria-describedby="email-error"
                >
                <span id="email-error" class="field-error" role="alert" aria-live="polite"></span>
            </div>

            <!-- Feedback Content Field -->
            <div class="form-group">
                <label for="content" class="form-label">
                    Your Feedback
                    <span class="required" aria-label="required">*</span>
                </label>
                <textarea 
                    id="content" 
                    name="content" 
                    class="form-textarea" 
                    placeholder="Please describe your feedback in detail (minimum 10 characters)..."
                    rows="6"
                    required
                    aria-describedby="content-error content-counter"
                ></textarea>
                <div class="textarea-footer">
                    <span id="content-counter" class="char-counter">0 / 5000</span>
                </div>
                <span id="content-error" class="field-error" role="alert" aria-live="polite"></span>
            </div>

            <!-- Submit Button -->
            <div class="form-actions">
                <button 
                    type="submit" 
                    id="submit-btn" 
                    class="submit-button"
                    aria-describedby="submit-status"
                >
                    <span class="button-text">Submit Feedback</span>
                    <!-- Loading Spinner -->
                    <span class="loading-spinner" hidden>
                        <svg class="spinner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="32">
                                <animate attributeName="stroke-dashoffset" values="32;0" dur="1s" repeatCount="indefinite"/>
                            </circle>
                        </svg>
                        <span>Submitting...</span>
                    </span>
                </button>
                <span id="submit-status" class="sr-only">Ready to submit</span>
            </div>
        </form>

        <footer class="footer">
            <p>Your feedback is confidential and will be used to improve our services.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
